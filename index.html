<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lava Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { background: #fff; display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = Math.min(600, window.innerWidth);
canvas.height = Math.min(800, window.innerHeight);

const W = canvas.width;
const H = canvas.height;

// ─── Ship ────────────────────────────────────────
const ship = {
  x: W / 2,
  y: H - 60,
  w: 24,
  h: 32,
  speed: 4,
};

// ─── Hoses (two pipes at top) ────────────────────
const hoseLeftX = W * 0.3;
const hoseRightX = W * 0.7;
const hoseY = 0;
const hoseLen = 60;

// ─── Lava ────────────────────────────────────────
const lavaParticles = [];
let gameOver = false;
let frame = 0;

// ─── Bullets ─────────────────────────────────────
const bullets = [];
let lastShot = 0;
const SHOOT_DELAY = 200;

// ─── Input ───────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

// ─── Spawn lava ──────────────────────────────────
function spawnLava() {
  for (const hx of [hoseLeftX, hoseRightX]) {
    lavaParticles.push({
      x: hx + (Math.random() - 0.5) * 6,
      y: hoseY + hoseLen,
      vx: (Math.random() - 0.5) * 1.2,
      vy: 1.2 + Math.random() * 0.8,
      r: 10 + Math.random() * 8,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

// ─── Update ──────────────────────────────────────
function update() {
  frame++;

  // Ship movement (always points up)
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy = -1;
  if (keys['ArrowDown'] || keys['KeyS']) dy = 1;

  // Normalise diagonal
  if (dx !== 0 && dy !== 0) {
    dx *= 0.707;
    dy *= 0.707;
  }

  ship.x += dx * ship.speed;
  ship.y += dy * ship.speed;
  ship.x = Math.max(ship.w / 2, Math.min(W - ship.w / 2, ship.x));
  ship.y = Math.max(ship.h / 2, Math.min(H - ship.h / 2, ship.y));

  // Shooting
  if ((keys['Space'] || keys['KeyZ']) && !gameOver) {
    if (Date.now() - lastShot > SHOOT_DELAY) {
      lastShot = Date.now();
      bullets.push({
        x: ship.x,
        y: ship.y - ship.h / 2,
        vy: -8,
      });
    }
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.y += b.vy;
    if (b.y < 0) { bullets.splice(i, 1); continue; }
    // Check vs lava
    for (let j = lavaParticles.length - 1; j >= 0; j--) {
      const l = lavaParticles[j];
      const d = Math.hypot(b.x - l.x, b.y - l.y);
      if (d < l.r + 3) {
        bullets.splice(i, 1);
        lavaParticles.splice(j, 1);
        break;
      }
    }
  }

  // Lava
  for (let i = lavaParticles.length - 1; i >= 0; i--) {
    const l = lavaParticles[i];
    l.x += l.vx;
    l.y += l.vy;
    l.vy += 0.08; // gravity
    l.phase += 0.1;

    // Remove if off screen
    if (l.y > H + 20 || l.x < -20 || l.x > W + 20) {
      lavaParticles.splice(i, 1);
      continue;
    }
    // Collision with ship
    if (!gameOver && !l.pop) {
      const d = Math.hypot(l.x - ship.x, l.y - ship.y);
      if (d < l.r + ship.w / 2.5) {
        gameOver = true;
      }
    }
  }

  // Spawn new lava occasionally
  if (!gameOver && frame % 80 === 0) spawnLava();
}

// ─── Draw ship (always pointing up) ──────────────
function drawShip() {
  const { x, y, w, h } = ship;
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -h / 2);         // nose
  ctx.lineTo(-w / 2, h / 2);     // bottom-left
  ctx.lineTo(0, h / 2 - 6);      // notch
  ctx.lineTo(w / 2, h / 2);      // bottom-right
  ctx.closePath();
  ctx.stroke();
  // thrust glow
  if (keys['ArrowUp'] || keys['KeyW']) {
    ctx.strokeStyle = '#f84';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-6, h / 2 - 4);
    ctx.lineTo(0, h / 2 + 8 + Math.random() * 6);
    ctx.lineTo(6, h / 2 - 4);
    ctx.stroke();
  }
  ctx.restore();
}

// ─── Draw hoses ──────────────────────────────────
function drawHoses() {
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 3;
  for (const hx of [hoseLeftX, hoseRightX]) {
    ctx.beginPath();
    ctx.moveTo(hx, hoseY);
    ctx.lineTo(hx, hoseY + hoseLen);
    ctx.stroke();
    // nozzle
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(hx - 6, hoseY + hoseLen);
    ctx.lineTo(hx + 6, hoseY + hoseLen);
    ctx.stroke();
    ctx.lineWidth = 3;
  }
}

// ─── Draw lava ───────────────────────────────────
function drawLava() {
  for (const l of lavaParticles) {
    const r = l.r + Math.sin(l.phase) * 0.8;
    // Glow effect
    const glow = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, r * 2.5);
    glow.addColorStop(0, `rgba(255, ${120 + 80 * Math.sin(l.phase)}, 0, 0.8)`);
    glow.addColorStop(0.4, `rgba(255, ${80 + 60 * Math.sin(l.phase + 1)}, 0, 0.5)`);
    glow.addColorStop(1, 'rgba(255, 0, 0, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(l.x, l.y, r * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = `rgb(255, ${160 + 80 * Math.sin(l.phase)}, 20)`;
    ctx.beginPath();
    ctx.arc(l.x, l.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─── Draw game over ──────────────────────────────
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#f44';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 30);

  ctx.fillStyle = '#555';
  ctx.font = '20px monospace';
  ctx.fillText('Press R to restart', W / 2, H / 2 + 30);
}

// ─── Draw bullets ────────────────────────────────
function drawBullets() {
  ctx.fillStyle = '#000';
  for (const b of bullets) {
    ctx.fillRect(b.x - 2, b.y - 5, 4, 10);
  }
}

// ─── Draw UI ─────────────────────────────────────
function drawUI() {
  ctx.fillStyle = '#555';
  ctx.font = '12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('Arrows/WASD move  |  Space/Z shoot', 10, H - 10);
}

// ─── Main loop ───────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  drawHoses();
  drawLava();
  drawBullets();
  drawShip();
  drawUI();

  if (gameOver) drawGameOver();
}

function loop() {
  if (!gameOver) update();
  draw();
  requestAnimationFrame(loop);
}

// ─── Restart ─────────────────────────────────────
window.addEventListener('keydown', function restart(e) {
  if (e.code === 'KeyR' && gameOver) {
    gameOver = false;
    lavaParticles.length = 0;
    bullets.length = 0;
    ship.x = W / 2;
    ship.y = H - 60;
  }
});

requestAnimationFrame(loop);
</script>
</body>
</html>
